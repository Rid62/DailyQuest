<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DailyQuest{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body {% if current_user.is_authenticated %}class="{% if current_user.streak >= 7 %}streak-galaxy{% elif current_user.streak >= 3 %}streak-fire{% endif %}"{% endif %}>
    {% if current_user.is_authenticated %}
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('dashboard') }}" class="nav-logo">⚔️ DailyQuest</a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('achievements') }}">Achievements</a></li>
                <li><a href="{{ url_for('leaderboard') }}">Leaderboard</a></li>
                <li><a href="{{ url_for('shop') }}">Shop 🏪</a></li>
                <li class="nav-user">{{ current_user.username }} (Lvl {{ current_user.level }})</li>
                <li><a href="{{ url_for('logout') }}" class="btn-logout">Logout</a></li>
            </ul>
        </div>
    </nav>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>May your quests be legendary! ⭐</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
